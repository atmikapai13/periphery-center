<!DOCTYPE html>
<html>
<head>
    <title>Generate Test Audio</title>
</head>
<body>
    <h2>Generate Test Audio Files</h2>
    <button onclick="generateFlipClack()">Generate Flip-Clack (0.5s)</button>
    <button onclick="generateAmbient()">Generate Ambient (5s)</button>
    
    <script>
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function generateFlipClack() {
            // Create a short clack sound
            const duration = 0.5;
            const sampleRate = audioContext.sampleRate;
            const buffer = audioContext.createBuffer(1, duration * sampleRate, sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < data.length; i++) {
                // Short burst of noise with decay
                const t = i / sampleRate;
                const decay = Math.exp(-t * 20);
                data[i] = (Math.random() * 2 - 1) * decay * 0.3;
            }
            
            downloadBuffer(buffer, 'flip-clack.wav');
        }
        
        function generateAmbient() {
            // Create ambient noise
            const duration = 5;
            const sampleRate = audioContext.sampleRate;
            const buffer = audioContext.createBuffer(1, duration * sampleRate, sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < data.length; i++) {
                // Low frequency noise
                const t = i / sampleRate;
                data[i] = (Math.random() * 2 - 1) * 0.05 * Math.sin(t * 100);
            }
            
            downloadBuffer(buffer, 'ambient-test.wav');
        }
        
        function downloadBuffer(buffer, filename) {
            const wav = audioBufferToWav(buffer);
            const blob = new Blob([wav], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
        }
        
        function audioBufferToWav(buffer) {
            const length = buffer.length * buffer.numberOfChannels * 2 + 44;
            const arrayBuffer = new ArrayBuffer(length);
            const view = new DataView(arrayBuffer);
            const channels = [];
            let offset = 0;
            let pos = 0;
            
            // Write WAV header
            setUint32(0x46464952); // "RIFF"
            setUint32(length - 8); // file length - 8
            setUint32(0x45564157); // "WAVE"
            setUint32(0x20746d66); // "fmt " chunk
            setUint32(16); // length = 16
            setUint16(1); // PCM (uncompressed)
            setUint16(buffer.numberOfChannels);
            setUint32(buffer.sampleRate);
            setUint32(buffer.sampleRate * 2 * buffer.numberOfChannels); // avg. bytes/sec
            setUint16(buffer.numberOfChannels * 2); // block-align
            setUint16(16); // 16-bit
            setUint32(0x61746164); // "data" - chunk
            setUint32(length - pos - 4); // chunk length
            
            // Write interleaved data
            for (let i = 0; i < buffer.numberOfChannels; i++) {
                channels.push(buffer.getChannelData(i));
            }
            
            while (pos < length) {
                for (let i = 0; i < buffer.numberOfChannels; i++) {
                    const sample = Math.max(-1, Math.min(1, channels[i][offset]));
                    view.setInt16(pos, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
                    pos += 2;
                }
                offset++;
            }
            
            return arrayBuffer;
            
            function setUint16(data) {
                view.setUint16(pos, data, true);
                pos += 2;
            }
            
            function setUint32(data) {
                view.setUint32(pos, data, true);
                pos += 4;
            }
        }
    </script>
</body>
</html>
